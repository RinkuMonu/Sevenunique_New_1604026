<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sevenunique — Crafting Digital Excellence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background: #fff;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Section ── */
      .hero {
        position: relative;
        width: 100%;
        min-height: 100vh;
        background: #ffffff;
        overflow: hidden;
        display: flex;
        align-items: center;
      }

      .hero__inner {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 1440px;
        margin: 0 auto;
        padding: 96px 96px 96px 96px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 48px;
      }

      /* ── Left ── */
      .hero__left {
        flex: 1;
        max-width: 640px;
      }

      .hero__heading {
        font-size: clamp(1.875rem, 3.8vw, 3.25rem);
        font-weight: 800;
        line-height: 1.12;
        letter-spacing: -0.02em;
        color: #111827;
        margin-bottom: 1.5rem;
      }

      .hero__heading .dot {
        color: #f97316;
      }

      .hero__body {
        font-size: clamp(0.9rem, 1.25vw, 1.05rem);
        line-height: 1.7;
        color: #374151;
        max-width: 560px;
        margin-bottom: 2.5rem;
      }

      .hero__ctas {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
      }

      .btn-primary {
        background: #2563eb;
        color: #ffffff;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        padding: 16px 28px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-primary:hover {
        background: #1d4ed8;
      }

      .btn-secondary {
        background: transparent;
        color: #111827;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        padding: 14px 28px;
        border: 2.5px solid #111827;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-secondary:hover {
        background: #f9fafb;
      }

      /* ── Right / Canvas ── */
      .hero__right {
        flex: 1;
        position: relative;
        min-width: 0;
      }

      .canvas-wrap {
        position: relative;
        width: 100%;
        height: 680px;
      }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      /* ── Responsive ── */
      @media (max-width: 1023px) {
        .hero__inner {
          flex-direction: column;
          padding: 80px 40px;
          align-items: flex-start;
        }
        .hero__left {
          max-width: 100%;
        }
        .canvas-wrap {
          height: 480px;
        }
      }

      @media (max-width: 639px) {
        .hero__inner {
          padding: 64px 24px;
        }
        .canvas-wrap {
          height: 380px;
        }
        .btn-primary,
        .btn-secondary {
          width: 100%;
          text-align: center;
        }
        .hero__ctas {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <div class="hero__inner">
        <!-- LEFT -->
        <div class="hero__left">
          <h1 class="hero__heading">
            We build better software because our talent is always
            upskilling<span class="dot">.</span>
          </h1>
          <p class="hero__body">
            Deliver better results on each and every project. Join the BairesDev
            Circles program to continually level up your technical, soft, and
            leadership skills.
          </p>
          <div class="hero__ctas">
            <button class="btn-primary">Upskill Inside Circles</button>
            <button class="btn-secondary">Hire Our Top Talent</button>
          </div>
        </div>

        <!-- RIGHT: Orbit Canvas -->
        <div class="hero__right">
          <div class="canvas-wrap">
            <canvas id="orbitCanvas" aria-hidden="true"></canvas>
          </div>
        </div>
      </div>
    </section>

    <script>
      (function () {
        const canvas = document.getElementById("orbitCanvas");
        const ctx = canvas.getContext("2d");
        let rafId;

        // ── Orbit config ──────────────────────────────────────────────
        const ORBITERS = [
          {
            r: 90,
            angle: (220 * Math.PI) / 180,
            speed: 0.004,
            size: 64,
            border: "#F59E0B",
            bg: "#FEF3C7",
            seed: "alpha",
          },
          {
            r: 155,
            angle: (315 * Math.PI) / 180,
            speed: 0.003,
            size: 56,
            border: "#10B981",
            bg: "#D1FAE5",
            seed: "bravo",
          },
          {
            r: 220,
            angle: (60 * Math.PI) / 180,
            speed: 0.002,
            size: 60,
            border: "#F87171",
            bg: "#FEE2E2",
            seed: "charlie",
          },
          {
            r: 220,
            angle: (170 * Math.PI) / 180,
            speed: 0.002,
            size: 56,
            border: "#60A5FA",
            bg: "#DBEAFE",
            seed: "delta",
          },
          {
            r: 290,
            angle: (270 * Math.PI) / 180,
            speed: 0.0015,
            size: 60,
            border: "#818CF8",
            bg: "#E0E7FF",
            seed: "echo",
          },
          {
            r: 290,
            angle: (30 * Math.PI) / 180,
            speed: 0.0015,
            size: 52,
            border: "#10B981",
            bg: "#D1FAE5",
            seed: "foxtrot",
          },
        ];

        const AVATAR_FACE_COLORS = [
          "#78350F",
          "#1E3A5F",
          "#374151",
          "#7C2D12",
          "#1E40AF",
          "#064E3B",
        ];

        // Load SVG avatars from DiceBear
        const imgs = ORBITERS.map((o) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.src = `https://api.dicebear.com/7.x/personas/svg?seed=${o.seed}&backgroundColor=ffffff`;
          return img;
        });

        // ── Resize ───────────────────────────────────────────────────
        const dpr = window.devicePixelRatio || 1;

        function resize() {
          const parent = canvas.parentElement;
          const w = parent.clientWidth;
          const h = parent.clientHeight;
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        new ResizeObserver(resize).observe(canvas.parentElement);
        resize();

        // ── Draw loop ─────────────────────────────────────────────────
        let lastTime = 0;

        function draw(now) {
          const delta = Math.min((now - lastTime) / 16, 3);
          lastTime = now;

          const W = canvas.width / dpr;
          const H = canvas.height / dpr;
          // Anchor center slightly right + vertically centred
          const cx = W * 0.52;
          const cy = H * 0.48;

          ctx.clearRect(0, 0, W, H);

          // ── Ring tracks ──
          [90, 155, 220, 290].forEach((r) => {
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(200,205,215,0.28)";
            ctx.lineWidth = 1;
            ctx.stroke();
          });

          // Highlighted salmon ring (matches screenshot)
          ctx.beginPath();
          ctx.arc(cx, cy, 220, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(252, 129, 100, 0.6)";
          ctx.lineWidth = 2.5;
          ctx.stroke();

          // ── Orbiters ──
          ORBITERS.forEach((orb, i) => {
            orb.angle += orb.speed * delta;
            const x = cx + orb.r * Math.cos(orb.angle);
            const y = cy + orb.r * Math.sin(orb.angle);
            const rad = orb.size / 2;

            // Drop shadow
            ctx.save();
            ctx.shadowColor = "rgba(0,0,0,0.14)";
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 2;
            ctx.beginPath();
            ctx.arc(x, y, rad, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.restore();

            // Coloured border ring
            ctx.beginPath();
            ctx.arc(x, y, rad, 0, Math.PI * 2);
            ctx.strokeStyle = orb.border;
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // Avatar or fallback
            const img = imgs[i];
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, rad - 2.5, 0, Math.PI * 2);
            ctx.clip();

            if (img.complete && img.naturalWidth > 0) {
              ctx.drawImage(
                img,
                x - rad + 2.5,
                y - rad + 2.5,
                (rad - 2.5) * 2,
                (rad - 2.5) * 2,
              );
            } else {
              // Fallback person silhouette
              ctx.fillStyle = orb.bg;
              ctx.fillRect(x - rad, y - rad, orb.size, orb.size);

              const faceColor =
                AVATAR_FACE_COLORS[i % AVATAR_FACE_COLORS.length];

              // Head
              ctx.beginPath();
              ctx.arc(x, y - rad * 0.15, rad * 0.38, 0, Math.PI * 2);
              ctx.fillStyle = faceColor;
              ctx.fill();

              // Torso/shoulders
              ctx.beginPath();
              ctx.ellipse(
                x,
                y + rad * 0.65,
                rad * 0.58,
                rad * 0.32,
                0,
                Math.PI,
                0,
              );
              ctx.fillStyle = faceColor;
              ctx.fill();
            }

            ctx.restore();
          });

          rafId = requestAnimationFrame(draw);
        }

        rafId = requestAnimationFrame(draw);
      })();
    </script>
  </body>
</html>
